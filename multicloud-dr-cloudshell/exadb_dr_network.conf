# Exadata Database on Oracle Database@Azure cross-region DR
# OCI networking-only automation configuration.
#
# Cloud Shell quick start:
# 1. Edit the required values in this file.
# 2. Run: ./setup_exadb_dr_network.sh
# 3. Roll back the latest run: ./rollback_exadb_dr_network.sh
# 4. Roll back a specific run: ./rollback_exadb_dr_network.sh ./exadb_dr_network_state_<timestamp>.env
#
# Manual verification checklist:
# - Confirm LPG peering is PEERED in the primary region.
# - Confirm LPG peering is PEERED in the standby region.
# - Confirm DRG RPC peering is PEERED across regions.
# - Confirm Exadata VCN route tables send remote client/backup CIDRs through the local LPG.
# - Confirm hub route tables send remote client/backup CIDRs through the local DRG.
# - Confirm NSGs were created in both Exadata VCNs.
# - Confirm rollback works after both full and partial setup runs.

[primary_region_configuration]
PRIMARY_REGION=""
PRIMARY_COMPARTMENT_OCID=""
PRIMARY_VCN_OCID=""
PRIMARY_CLIENT_SUBNET_CIDR=""
PRIMARY_BACKUP_SUBNET_CIDR=""

[standby_region_configuration]
STANDBY_REGION=""
STANDBY_COMPARTMENT_OCID=""
STANDBY_VCN_OCID=""
STANDBY_CLIENT_SUBNET_CIDR=""
STANDBY_BACKUP_SUBNET_CIDR=""

[hub_vcn_configuration]
# Optional: specify explicit, non-overlapping CIDRs for the transit hub VCNs.
# Oracle's cross-region DR example for Exadata Database on Oracle Database@Azure
# uses /29 hub VCN CIDRs because no subnets are required in the hub VCN for
# transit routing. Keep these hub CIDRs small and ensure they do not overlap
# with the primary VCN, standby VCN, client subnet, backup subnet, or any
# other routed CIDR in your OCI environment.
# If either value is left blank, the setup script will auto-pick a small
# non-overlapping /29 CIDR for the missing hub VCN.
PRIMARY_HUB_VCN_CIDR=""
STANDBY_HUB_VCN_CIDR=""

[database_listener_configuration]
# Optional database listener ports for NSG rule creation.
# Set the TCP listener port to add Oracle Net TCP listener rules
# (commonly 1521). Set the TCPS listener port to add Oracle Net TCPS
# listener rules (commonly 2484). Leave either value blank to skip that
# listener rule set.
DB_TCP_LISTENER_PORT=""
DB_TCPS_LISTENER_PORT=""

[global_optional_configuration]
# true or false
ALLOW_SSH="false"

# Used as the prefix for OCI display names. The setup script appends a UTC timestamp suffix.
NAME_PREFIX="exadb-dr-network"
