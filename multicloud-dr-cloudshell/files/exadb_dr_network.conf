# OCI networking-only configuration for cross-region disaster recovery
# for Exadata Database on Oracle Database@Azure.
#
# This bundle creates only OCI network resources needed for the DR transit
# path. It does not configure databases, Data Guard, backups, compute,
# applications, or Azure-side components.
#
# Quick start in OCI Cloud Shell:
# 1. Fill in the required values below.
# 2. Optionally set hub VCN CIDRs, listener ports, SSH access, and a name prefix.
# 3. Run: ./setup_exadb_dr_network.sh
# 4. To remove the most recent deployment: ./rollback_exadb_dr_network.sh
# 5. To remove a specific deployment:
#    ./rollback_exadb_dr_network.sh ./exadb_dr_network_state_<timestamp>.env
#
# Manual verification after setup:
# - LPG peering is PEERED in the primary region.
# - LPG peering is PEERED in the standby region.
# - DRG remote peering is PEERED across regions.
# - Exadata VCN route tables send remote client and backup CIDRs to the local LPG.
# - Hub route tables contain the expected local and remote static routes.
# - NSGs were created in both Exadata VCNs.
#
# Manual verification after rollback:
# - RPCs, DRGs, LPGs, hub route tables, and hub VCNs created by setup are removed.
# - Rollback succeeds after both full and partial setup runs.

[primary_region_configuration]
# Required settings for the primary-region Exadata VCN.
PRIMARY_REGION=""
PRIMARY_COMPARTMENT_OCID=""
PRIMARY_VCN_OCID=""
PRIMARY_CLIENT_SUBNET_CIDR=""
PRIMARY_BACKUP_SUBNET_CIDR=""

[standby_region_configuration]
# Required settings for the standby-region Exadata VCN.
STANDBY_REGION=""
STANDBY_COMPARTMENT_OCID=""
STANDBY_VCN_OCID=""
STANDBY_CLIENT_SUBNET_CIDR=""
STANDBY_BACKUP_SUBNET_CIDR=""

[hub_vcn_configuration]
# Optional transit hub VCN CIDRs.
#
# Oracle's cross-region DR example for Exadata Database on Oracle Database@Azure
# uses small /29 hub VCN CIDRs because the hub VCN serves as a transit layer
# and does not require application subnets.
#
# Recommendation:
# - Use /29 if you want to define the hub CIDRs yourself.
# - Keep them non-overlapping with both Exadata VCNs, both client subnets,
#   both backup subnets, and any other routed CIDRs in your OCI estate.
#
# If either value is left blank, the setup script auto-picks a safe
# non-overlapping /29 CIDR for that hub VCN.
PRIMARY_HUB_VCN_CIDR=""
STANDBY_HUB_VCN_CIDR=""

[database_listener_configuration]
# Optional database listener ports used for NSG rule creation.
#
# If a value is provided, the setup script creates cross-region NSG rules
# for that listener. If left blank, that listener rule set is skipped.
#
# Common values:
# - DB_TCP_LISTENER_PORT=1521
# - DB_TCPS_LISTENER_PORT=2484
DB_TCP_LISTENER_PORT=""
DB_TCPS_LISTENER_PORT=""

[global_optional_configuration]
# Optional SSH access control for the created NSGs.
# Set to true to allow SSH rules. Leave false to keep SSH closed.
ALLOW_SSH="false"

# Optional display-name prefix for OCI resources created by setup.
# The script appends a UTC timestamp suffix for deterministic naming.
NAME_PREFIX="exadb-dr-network"
